<style>
/* --- Skin: loading state + overlay --- */
body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0e1013; color: #e6e8eb; }
#pw-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: radial-gradient(ellipse at center, #1a1e24 0%, #0e1013 70%);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.pw-box {
  max-width: 420px; width: 100%; text-align: center;
  background: #14171c; border: 1px solid #2b3038;
  border-radius: 12px; padding: 36px 28px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.pw-box h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.02em; font-weight: 700; }
.pw-box .sub { color: #8b9199; font-size: 14px; margin-bottom: 24px; }
.pw-box label { display: block; text-align: left; font-size: 12px; color: #8b9199; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
.pw-box input[type=password] {
  width: 100%; box-sizing: border-box;
  background: #0e1013; border: 1px solid #2b3038; border-radius: 6px;
  padding: 12px 14px; color: #e6e8eb; font-size: 15px; outline: none;
  font-family: inherit;
}
.pw-box input:focus { border-color: #e8b455; }
.pw-box button {
  margin-top: 14px; width: 100%;
  background: #e8b455; color: #0e1013; border: 0;
  padding: 12px 14px; border-radius: 6px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit;
}
.pw-box button:hover { background: #f2c572; }
.pw-box .err { color: #e57373; font-size: 13px; margin-top: 10px; min-height: 18px; }
.pw-box .hint { color: #4a4f57; font-size: 11px; margin-top: 20px; letter-spacing: 0.1em; text-transform: uppercase; }
/* --- Once decrypted, inner CSS takes over --- */
#dossier { display: none; }
</style>
</head>

<div id="pw-overlay">

    <label for="pw">Passwort</label>
    <input type="password" id="pw" autofocus autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit">Entsperren</button>
    <div class="err" id="pw-err"></div>
    <div class="hint">AES-256 · CBC · Passphrase-derived Key</div>
  </form>
</div>

function tryUnlock(pw) {
  try {
    const dec = CryptoJS.AES.decrypt(PAYLOAD, pw);
    const txt = dec.toString(CryptoJS.enc.Utf8);
    if (!txt || txt.length < 100) return null;
    // sanity: must contain a known marker
    if (txt.indexOf('section-wrap') === -1) return null;
    return txt;
  } catch (e) {
    return null;
  }
}

function reveal(html) {
  const target = document.getElementById('dossier');
  target.innerHTML = html;
  // move any <style> inside the decrypted HTML into <head>
  target.querySelectorAll('style').forEach(s => document.head.appendChild(s));
  // re-run any <script> tags (innerHTML doesn't execute them)
  target.querySelectorAll('script').forEach(oldS => {
    const ns = document.createElement('script');
    for (const a of oldS.attributes) ns.setAttribute(a.name, a.value);
    ns.text = oldS.text;
    oldS.parentNode.replaceChild(ns, oldS);
  });
  target.style.display = 'block';
  document.getElementById('pw-overlay').style.display = 'none';
  try { sessionStorage.setItem('sos_pw_ok', '1'); } catch(e) {}
}

document.getElementById('pw-form').addEventListener('submit', e => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('pw-err');
  err.textContent = '';
  const txt = tryUnlock(pw);
  if (txt) {
    reveal(txt);
  } else {
    err.textContent = 'Passwort falsch.';
    document.getElementById('pw').select();
  }
});

// Auto-unlock if session already validated within this tab
try {
  if (sessionStorage.getItem('sos_pw_ok') === '1') {
    // still need to actually decrypt; we store nothing sensitive — require re-enter
  }
} catch(e) {}

body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
header { position: sticky; top: 0; background: rgba(14,16,19,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); z-index: 100; padding: 14px 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.logo { font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; font-size: 14px; color: var(--muted); text-align: center; }
.logo span { color: var(--accent); }
nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 1280px; width: 100%; }
@property --nav-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
@keyframes nav-rotate { to { --nav-angle: 360deg; } }
.tab-link {
  position: relative;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 999px;
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  border: 1px solid transparent;
  font-family: inherit;
  white-space: nowrap;
  transition: color .25s, transform .25s, background .25s;
  z-index: 1;
}
.tab-link::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 999px;
  padding: 1px;
  background: conic-gradient(from var(--nav-angle), var(--accent), var(--accent2), var(--green), var(--accent));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity: .28;
  animation: nav-rotate 9s linear infinite;
  transition: opacity .3s, inset .25s;
  pointer-events: none;
  z-index: -1;
}
.tab-link:nth-child(even)::before { animation-direction: reverse; animation-duration: 11s; }
.tab-link:nth-child(3n)::before { animation-duration: 14s; animation-delay: -3s; }
.tab-link:nth-child(4n)::before { animation-delay: -6s; }
.tab-link:hover { color: var(--fg); transform: translateY(-1px); background: var(--bg2); }
.tab-link:hover::before { opacity: .85; inset: -2px; }
.tab-link.active {
  color: var(--bg);
  background: var(--accent);
  font-weight: 600;
}
.tab-link.active::before { opacity: 0; }
@media (prefers-reduced-motion: reduce) {
  .tab-link::before { animation: none; opacity: .35; }
}
main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 96px; }
.section-wrap { display: block; animation: fade .3s ease-out; border-top: 1px dashed var(--border); padding-top: 32px; margin-top: 32px; }
.section-wrap:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
body.js-tabs .section-wrap { display: none; border-top: none; padding-top: 0; margin-top: 0; }
body.js-tabs .section-wrap.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.tab-pane { display: block; border-left: 2px solid var(--border); padding-left: 14px; margin: 8px 0; }
body.js-tabs .tab-pane { display: none; border-left: none; padding-left: 0; }
body.js-tabs .tab-pane.active { display: block; }
h1 { font-size: 40px; line-height: 1.1; letter-spacing: -0.03em; margin: 8px 0 16px; }
h2 { font-size: 28px; letter-spacing: -0.02em; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
h3 { font-size: 20px; letter-spacing: -0.01em; margin-top: 32px; color: var(--accent); }
h4 { font-size: 16px; margin-top: 20px; }
h5 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 14px 0 6px; }
.lede { font-size: 16px; color: var(--muted); max-width: 72ch; }
.hero-label { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
.hero-sub { font-size: 17px; color: var(--muted); max-width: 80ch; margin-bottom: 28px; }
.hero-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.stat.green { border-color: var(--green); }
.stat.red { border-color: var(--red); }
.stat-num { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
.stat.green .stat-num { color: var(--green); }
.stat.red .stat-num { color: var(--red); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
.engine-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.chip { background: var(--card); border: 1px solid var(--border); padding: 5px 10px; border-radius: 999px; font-size: 11px; color: var(--muted); }
.reframe-box { background: linear-gradient(135deg, rgba(232,180,85,0.06), rgba(106,208,140,0.04)); border: 1px solid var(--accent); border-radius: 10px; padding: 20px 24px; margin-top: 16px; }
.reframe-box h3 { margin-top: 0; color: var(--accent); }
.akte-list { list-style: none; padding: 0; }
.akte-list li { border-left: 3px solid var(--accent); padding: 8px 14px; margin: 6px 0; background: var(--card); border-radius: 0 6px 6px 0; }
.timeline { margin: 16px 0; }
.tl-item { display: flex; border-left: 2px solid var(--border); padding: 8px 0 8px 18px; margin-left: 8px; position: relative; }
.tl-item::before { content: ''; position: absolute; left: -6px; top: 14px; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
.tl-date { min-width: 150px; color: var(--accent); font-weight: 600; font-size: 12px; }
.tl-event { flex: 1; font-size: 14px; }
.tl-highlight .tl-event { background: rgba(232, 180, 85, 0.08); padding: 6px 10px; border-radius: 4px; }
.tl-highlight::before { background: var(--accent2); box-shadow: 0 0 0 4px rgba(244,115,115,0.15); }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; margin-top: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-top: 16px; }
.card { background: var(--card); border: 1px solid var(--border); padding: 14px 16px; border-radius: 8px; }
.card.red { border-color: var(--red); }
.card.green { border-color: var(--green); }
.card h4 { margin-top: 0; }
.data-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
.data-table th { background: var(--hl); text-align: left; padding: 9px 10px; font-weight: 600; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
.data-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.data-table tr:hover td { background: var(--hl); }
.stations { list-style: none; counter-reset: stations; padding: 0; }
.stations li { counter-increment: stations; padding: 10px 14px 10px 48px; position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin: 5px 0; font-size: 14px; }
.stations li::before { content: counter(stations, decimal-leading-zero); position: absolute; left: 14px; top: 11px; color: var(--accent); font-weight: 700; font-size: 13px; }
.j-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; margin-top: 16px; }
.j-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.j-head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
.j-name { font-size: 18px; font-weight: 700; }
.j-age { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
.j-brille { font-size: 13px; color: var(--accent); font-style: italic; margin-bottom: 10px; }
.j-section h5 { margin: 12px 0 4px; }
.j-section p { font-size: 13px; margin: 0; }
.content-block { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin: 16px 0; }
.content-block h3 { margin-top: 0; color: var(--fg); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.content-brille { font-size: 12px; color: var(--accent); font-style: italic; margin-bottom: 12px; }
.tabs-mini { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 14px; padding-bottom: 8px; }
.tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit; }
.tab-btn:hover { color: var(--fg); background: var(--hl); }
.tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.tweet-list { list-style: none; padding: 0; counter-reset: twt; }
.tweet-list li { counter-increment: twt; margin: 6px 0; }
.tweet { background: var(--hl); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 6px 6px 0; white-space: pre-wrap; font-size: 13px; }
.tweet-list li::before { content: counter(twt) '/'; color: var(--muted); font-size: 11px; margin-right: 6px; }
.slide-list { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.slide { background: var(--hl); border: 1px solid var(--border); border-radius: 8px; padding: 12px; height: 100%; }
.slide-num { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 6px; }
.slide-body { font-size: 12px; white-space: pre-wrap; }
.platform-body { background: var(--hl); padding: 14px 16px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; }
.yt { background: var(--hl); border-radius: 8px; padding: 14px; }
.yt-title { font-size: 15px; font-weight: 600; color: var(--fg); margin: 0 0 6px; text-transform: none; letter-spacing: 0; }
.yt-desc { font-size: 12px; white-space: pre-wrap; color: var(--muted); }
.engine-block { margin: 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; }
.engine-block summary { padding: 8px 0; cursor: pointer; font-weight: 600; list-style: none; }
.engine-block summary::-webkit-details-marker { display: none; }
.engine-block summary::before { content: '▸ '; color: var(--accent); }
.engine-block[open] summary::before { content: '▾ '; }
.engine-output { font-size: 14px; padding: 10px 0; }
.engine-output table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.engine-output th, .engine-output td { text-align: left; border-bottom: 1px solid var(--border); padding: 6px 10px; vertical-align: top; }
.persona { background: var(--hl); border: 1px solid var(--border); border-radius: 8px; margin: 6px 0; padding: 0; }
.persona summary { padding: 10px 14px; cursor: pointer; font-weight: 600; list-style: none; font-size: 14px; }
.persona summary::-webkit-details-marker { display: none; }
.persona summary::before { content: '▸ '; color: var(--accent); }
.persona[open] summary::before { content: '▾ '; }
.persona-meta { font-size: 10px; color: var(--muted); padding: 0 14px; letter-spacing: 0.1em; }
.persona-body { padding: 0 14px 14px; font-size: 13px; }
.persona.gegenpol { border-color: var(--accent2); }
.persona.gegenpol summary::before { color: var(--accent2); }
.legal-box { background: var(--card); border: 1px solid var(--green); border-radius: 8px; padding: 18px 22px; margin: 16px 0; font-size: 14px; }
.gegenpol-box { background: var(--card); border: 1px solid var(--accent2); border-radius: 8px; padding: 18px 22px; margin: 16px 0; }
.rules { list-style: none; counter-reset: rules; padding: 0; }
.rules li { counter-increment: rules; padding: 10px 14px 10px 44px; position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin: 6px 0; font-size: 14px; }
.rules li::before { content: counter(rules, decimal-leading-zero); position: absolute; left: 14px; top: 11px; color: var(--accent); font-weight: 700; font-size: 13px; }
.top-picks { list-style: decimal; padding-left: 20px; font-size: 14px; }
.top-picks li { margin: 8px 0; }
.mri-headline { display: flex; gap: 28px; align-items: center; padding: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin: 16px 0; }
.mri-score { font-size: 64px; font-weight: 800; color: var(--accent); letter-spacing: -0.04em; line-height: 1; }
.mri-verdict { flex: 1; }
.mri-label { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.axes { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
.axis { display: grid; grid-template-columns: 180px 1fr 48px; gap: 10px; align-items: center; font-size: 13px; }
.axis-name { text-transform: capitalize; }
.axis-bar { background: var(--hl); border-radius: 4px; height: 18px; overflow: hidden; position: relative; }
.axis-fill { height: 100%; border-radius: 4px; transition: width .6s; }
.axis-red { background: var(--red); }
.axis-accent { background: var(--accent); }
.axis-green { background: var(--green); }
.axis-val { text-align: right; font-weight: 600; color: var(--fg); }
.foerder-md, .recht-md, .dae-output, .transform-output { font-size: 14px; }
.transform-output h2 { font-size: 20px; color: var(--accent); margin-top: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.transform-output h3, .transform-output h4 { color: var(--fg); margin-top: 18px; }
.transform-output h4 { font-size: 15px; color: var(--accent); }
.transform-output strong { color: var(--accent); }
.transform-output em { color: var(--green); }
.transform-output blockquote { border-left: 3px solid var(--accent); padding: 8px 14px; background: rgba(232,180,85,0.04); margin: 10px 0; font-style: italic; color: var(--fg); }
.transform-output hr { margin: 24px 0; }
.foerder-md table, .recht-md table, .dae-output table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
.foerder-md th, .foerder-md td, .recht-md th, .recht-md td, .dae-output th, .dae-output td { text-align: left; border-bottom: 1px solid var(--border); padding: 5px 8px; vertical-align: top; }
.foerder-md th, .recht-md th, .dae-output th { background: var(--hl); }
hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
code { background: var(--hl); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
strong { color: var(--fg); }
em { color: var(--accent); font-style: normal; }
footer { text-align: center; padding: 36px 24px; color: var(--muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; }
@media (max-width: 720px) {
  h1 { font-size: 28px; } h2 { font-size: 22px; }
  header { padding: 10px 10px 12px; gap: 8px; }
  main { padding: 18px 12px 120px; }
  nav { gap: 6px; }
  .tab-link { padding: 8px 13px; font-size: 12px; }
  .mri-headline { flex-direction: column; }
  .mri-score { font-size: 48px; }
  .axis { grid-template-columns: 120px 1fr 40px; }
}

/* ========== FEEDBACK SYSTEM (Boehm-Pattern) ========== */
.fb-block {
  margin-top: 48px; padding: 24px;
  border: 1px solid var(--border); border-radius: 14px;
  background: linear-gradient(160deg, rgba(232,180,85,.05) 0%, rgba(106,208,140,.025) 100%);
  position: relative;
}
.fb-block::before {
  content: ''; position: absolute; top: -1px; left: 24px; right: 24px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(232,180,85,.5), transparent);
}
.fb-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.fb-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(232,180,85,.15); color: var(--accent);
  font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
}
.fb-title { font-size: 15px; font-weight: 600; color: var(--fg); margin: 0; }
.fb-hint { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.55; }
.fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
@media (max-width: 720px) { .fb-grid { grid-template-columns: 1fr; } }
.fb-slider-wrap {
  padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
  background: rgba(10,14,26,.4);
}
.fb-slider-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--fg); margin-bottom: 8px; font-weight: 500;
}
.fb-val {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px; font-weight: 600; color: var(--accent);
  min-width: 36px; text-align: right;
}
.fb-slider-tip { font-size: 10px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
.fb-slider {
  width: 100%; height: 6px; border-radius: 3px;
  -webkit-appearance: none; appearance: none;
  background: var(--hl); outline: none; cursor: pointer;
}
.fb-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 4px 12px rgba(232,180,85,.4);
  cursor: pointer; border: 2px solid var(--bg);
}
.fb-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: 2px solid var(--bg); cursor: pointer;
}
.fb-handlung { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.fb-handlung-btn {
  flex: 1; min-width: 100px;
  padding: 9px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.fb-handlung-btn:hover { border-color: var(--fg); color: var(--fg); }
.fb-handlung-btn.active[data-val="0"]   { background: rgba(106,208,140,.15); border-color: var(--green); color: var(--green); }
.fb-handlung-btn.active[data-val="50"]  { background: rgba(232,180,85,.15);  border-color: var(--accent); color: var(--accent); }
.fb-handlung-btn.active[data-val="100"] { background: rgba(229,115,115,.15); border-color: var(--red); color: var(--red); }
.fb-focus-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.fb-focus-chip {
  padding: 5px 11px; border-radius: 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 11px; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.fb-focus-chip:hover { border-color: var(--accent); color: var(--accent); }
.fb-textarea {
  width: 100%; min-height: 90px; padding: 12px 14px; box-sizing: border-box;
  border-radius: 10px; border: 1px solid var(--border);
  background: rgba(10,14,26,.4); color: var(--fg);
  font-family: inherit; font-size: 13px; line-height: 1.55;
  resize: vertical; outline: none; transition: border-color .15s;
}
.fb-textarea:focus { border-color: var(--accent); }
.fb-textarea::placeholder { color: var(--muted); }
.fb-saved-hint {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; font-size: 11px; color: var(--muted);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.fb-saved-hint.show { color: var(--green); }
.fb-saved-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
.fb-saved-hint.show .fb-saved-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }

/* Send-Bar fixed */
.fb-send-bar {
  position: fixed; bottom: 20px; right: 20px; z-index: 500;
  display: flex; gap: 8px; padding: 10px;
  background: rgba(13,18,32,.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(232,180,85,.12);
  max-width: calc(100vw - 40px); flex-wrap: wrap;
}
.fb-send-bar.empty { display: none; }
.fb-send-btn {
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--fg); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.fb-send-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.fb-send-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg); border-color: transparent;
}
.fb-send-btn.primary:hover { box-shadow: 0 8px 24px rgba(232,180,85,.4); color: var(--bg); }
.fb-send-counter {
  padding: 6px 10px; font-size: 11px; color: var(--fg);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  display: inline-flex; align-items: center;
}

/* Analysis tab */
.fb-analysis-hero {
  padding: 28px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(232,180,85,.08) 0%, rgba(106,208,140,.04) 100%);
  border: 1px solid var(--border); margin-bottom: 20px;
}
.fb-analysis-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin: 16px 0;
}
.fb-stat {
  padding: 16px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border);
  text-align: center;
}
.fb-stat-val {
  font-size: 26px; font-weight: 700; letter-spacing: -.02em;
  font-family: 'JetBrains Mono', ui-monospace, monospace; margin-bottom: 4px;
  color: var(--accent);
}
.fb-stat-lab { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.fb-section-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; align-items: center;
  padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
